set -g prefix C-q
set -sg escape-time 1
set -g mode-keys vi

set -g mouse on
set -g history-limit 50000

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

bind v split-window -h
bind s split-window -v

unbind [
bind Escape copy-mode
bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g status-fg white
set -g status-bg black

set -g pane-active-border-style fg=blue

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/aserowy/tmux.nvim
#
# Disabled: psmux does not expand format variables in `if -F` within bind-key,
# causing #{pane_at_*} to always evaluate as truthy (raw non-empty string).
# This makes C-h/j/k/l always send keys to vim instead of switching panes,
# which also intercepts the prefix key (C-q). Tracking: psmux issue #183.

bind-key -n 'C-h' select-pane -L
bind-key -n 'C-j' select-pane -D
bind-key -n 'C-k' select-pane -U
bind-key -n 'C-l' select-pane -R

