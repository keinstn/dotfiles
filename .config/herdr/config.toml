onboarding = false
# herdr configuration
# Place this file at ~/.config/herdr/config.toml
#
# Keybindings are aligned with ghostty (.config/ghostty/splits-terminal.ghostty)
# and wezterm (.config/wezterm/wezterm.lua):
#   - prefix/leader key: ctrl+q
#   - "v" -> split left/right, "s" -> split top/bottom
#   - ctrl+h/j/k/l -> move focus between panes (direct, no prefix)
#   - ctrl+d -> close current pane
#   - prefix+t -> new tab

[keys]
# Prefix key to enter prefix mode (matches ghostty/wezterm leader).
prefix = "ctrl+q"

# New tab. Moved off "prefix+c" (default), which collided with a terminal keybinding.
new_tab = "prefix+t"

# New workspace. herdr's own default binding.
new_workspace = "prefix+shift+n"

# Cycle workspaces. Prefix-based for the same reason.
next_workspace = "prefix+right"
previous_workspace = "prefix+left"

# Moved off "prefix+s" (default) so split_horizontal can use the "s" key,
# matching the ghostty/wezterm convention below.
settings = "prefix+shift+s"

# Split panes.
# split_vertical: vertical divider -> left/right panes.
#   Matches ghostty `ctrl+q>v` (new_split:right) / wezterm `LEADER v` (SplitHorizontal).
split_vertical = "prefix+v"
# split_horizontal: horizontal divider -> top/bottom panes.
#   Matches ghostty `ctrl+q>s` (new_split:down) / wezterm `LEADER s` (SplitVertical).
split_horizontal = "prefix+s"

# Close current pane (matches ghostty/wezterm `ctrl+d`).
close_pane = "ctrl+d"

# Move focus between panes.
# Uses prefix (not direct ctrl+h/j/k/l) because on Windows, herdr's input
# handling normalizes Ctrl+H to the same key as Backspace, so a prefix-less
# ctrl+h binding swallows Backspace inside panes.
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
